name: uv Publish to PyPI or TestPyPI

on:
  # Automated triggers
  push:
    tags:
      - "v*.*.*" # Trigger on standard version tags
      - "!v*.*.*.dev*" # Ignore development releases
  # Manual triggers
  workflow_dispatch:
    inputs:
      index:
        description: "Target package index. Choose 'pypi' for the official PyPI repository or 'testpypi' for the TestPyPI repository."
        required: true
        type: choice
        options:
          - pypi
          - testpypi
        default: "pypi"

jobs:
  publish:
    runs-on: ubuntu-latest
    # Select environment based on manual input, default to 'pypi' on pushed tags
    environment: ${{ inputs.index || 'pypi' }}
    permissions:
      contents: write
      id-token: write # Crucial for PyPI Trusted Publishing (OIDC)

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Ensure version tag exists on manual dispatch
        if: ${{ github.event_name == 'workflow_dispatch' }}
        shell: bash
        run: |
          VERSION="$(python - <<'PY'
          import tomllib
          from pathlib import Path

          with Path("pyproject.toml").open("rb") as f:
              data = tomllib.load(f)

          print(data['project']['version'])
          PY
          )"

          TAG="v$VERSION"

          if [[ "$VERSION" == *".dev"* ]]; then
            echo "Error: Refusing manual publish for development version '$VERSION'."
            echo "Bump to a stable version before dispatching this workflow."
            exit 1
          fi

          echo "Resolved version tag: $TAG"

          if git ls-remote --tags origin "refs/tags/$TAG" | grep -q .; then
            echo "Tag '$TAG' already exists on origin. Skipping tag creation."
          else
            echo "Tag '$TAG' does not exist on origin. Creating and pushing."
            git tag "$TAG"
            git push origin "$TAG"
          fi

      - name: Build and Publish to PyPI or TestPyPI
        run: |
          echo "Building distributions"
          uv build

          INDEX="${{ inputs.index || 'pypi' }}"

          echo "Publishing to $INDEX"
          # PyPI is the default target, while testpypi uses the custom index configuration
          if [ "$INDEX" = "testpypi" ]; then
            uv publish --index testpypi
          else
            uv publish
          fi
