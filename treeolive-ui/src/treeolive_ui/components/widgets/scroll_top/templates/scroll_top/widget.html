{% load static %}
{% if widget_scroll_top|default_if_none:True %}
    <a href="#"
       id="widget_scroll_top"
       class="btn d-flex align-items-center justify-content-center position-fixed end-0 bottom-0 mb-3 me-3 z-2 bg-primary text-white rounded opacity-0 invisible transition">
        <i class="bi bi-arrow-up-short fs-3 lh-1"></i>
    </a>
    <style nonce="{{ csp_nonce }}">
        #widget_scroll_top {
            width: 40px;
            height: 40px;
            transition: all 0.3s
        }
    </style>
    <script defer src="{% static 'scroll_top/widget.js' %}"></script>
{% endif %}
