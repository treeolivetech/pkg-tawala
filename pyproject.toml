[tool.uv.workspace]
members = ["tawala", "tawala-cli", "tawala-docs"]

[dependency-groups]
dev = ["pre-commit>=4.5.1", "ty>=0.0.31"]

[tool.djlint]
ignore = "H016,H030,H031"

[tool.ruff.format]
preview = true

[tool.ruff.lint]
select = ["D"]
ignore = ["D203", "D213"]

[[tool.uv.index]]
name = "testpypi"
url = "https://test.pypi.org/simple/"
publish-url = "https://test.pypi.org/legacy/"
explicit = true
