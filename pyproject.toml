[tool.uv.workspace]
members = [
    "core/tawala",
    "core/tawala-api",
    "core/tawala-ui",
    "components/tawala-wip",
    "components/tawala-school",
    # api feeds the components, which in turn feed the base package
    # either directly as with the case of ui
    # or optionally as with the case of wip, school etc.
]

[dependency-groups]
dev = ["pre-commit>=4.6.0", "ty>=0.0.32"]

[tool.ruff]
exclude = ["*/migrations/*"]

[tool.ruff.format]
preview = true

[tool.ruff.lint]
select = ["D"]
ignore = ["D203", "D213"]

[[tool.uv.index]]
name = "testpypi"
url = "https://test.pypi.org/simple/"
publish-url = "https://test.pypi.org/legacy/"
explicit = true
