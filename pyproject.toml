[tool.uv.workspace]
members = [
    "core/tawala",
    "core/tawala-api",
    "core/tawala-ui",
    "components/tawala-wip",
    "components/tawala-school",
    # api feeds the components, which in turn feed the base package
    # either directly as with the case of ui
    # or optionally as with the case of wip, school etc.
]

[dependency-groups]
dev = ["pre-commit>=4.6.0"]

[[tool.uv.index]]
name = "testpypi"
url = "https://test.pypi.org/simple/"
publish-url = "https://test.pypi.org/legacy/"
explicit = true
