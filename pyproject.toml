[tool.uv.workspace]
members = ["treeolive", "treeolive-api", "treeolive-ui"]

[dependency-groups]
dev = ["pre-commit>=4.6.0", "ty>=0.0.32"]

[tool.ruff.format]
preview = true

[tool.ruff.lint]
select = ["D"]
ignore = ["D203", "D213"]

[[tool.uv.index]]
name = "testpypi"
url = "https://test.pypi.org/simple/"
publish-url = "https://test.pypi.org/legacy/"
explicit = true
